name: PR

on:
  push:
    branches: [main, dev, multilinear_v6]
  pull_request:
    branches:
      - "**"
    paths:
      - "crates/**"
      - "slop/**"
      - "sp1-gpu/**"
      - "examples/**"
      - "Cargo.toml"
      - ".github/workflows/**"
      - ".github/actions/**"
  merge_group:

env:
  SP1_CI_IN_PROGRESS: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-x86:
    name: Test (x86-64)
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli

      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-targets --all-features --tests

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: >-
            --release --workspace
            --exclude sp1-verifier
            --exclude sp1-gpu-air
            --exclude sp1-gpu-basefold
            --exclude sp1-gpu-challenger
            --exclude sp1-gpu-commit
            --exclude sp1-gpu-cudart
            --exclude sp1-gpu-jagged-assist
            --exclude sp1-gpu-jagged-sumcheck
            --exclude sp1-gpu-jagged-tracegen
            --exclude sp1-gpu-logup-gkr
            --exclude sp1-gpu-merkle-tree
            --exclude sp1-gpu-perf
            --exclude sp1-gpu-prover
            --exclude sp1-gpu-server
            --exclude sp1-gpu-shard-prover
            --exclude sp1-gpu-sys
            --exclude sp1-gpu-tracegen
            --exclude sp1-gpu-tracing
            --exclude sp1-gpu-utils
            --exclude sp1-gpu-zerocheck
            --features native-gnark,experimental,profiling
        env:
          RUSTFLAGS: -Copt-level=3 -Cdebug-assertions -Coverflow-checks=y -Cdebuginfo=0
          RUST_BACKTRACE: 1

  test-arm:
    name: Test (ARM)
    runs-on: ubuntu-24.04-arm
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli

      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-targets --all-features --tests

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: >-
            --release --workspace
            --exclude sp1-verifier
            --exclude sp1-gpu-air
            --exclude sp1-gpu-basefold
            --exclude sp1-gpu-challenger
            --exclude sp1-gpu-commit
            --exclude sp1-gpu-cudart
            --exclude sp1-gpu-jagged-assist
            --exclude sp1-gpu-jagged-sumcheck
            --exclude sp1-gpu-jagged-tracegen
            --exclude sp1-gpu-logup-gkr
            --exclude sp1-gpu-merkle-tree
            --exclude sp1-gpu-perf
            --exclude sp1-gpu-prover
            --exclude sp1-gpu-server
            --exclude sp1-gpu-shard-prover
            --exclude sp1-gpu-sys
            --exclude sp1-gpu-tracegen
            --exclude sp1-gpu-tracing
            --exclude sp1-gpu-utils
            --exclude sp1-gpu-zerocheck
            --features native-gnark,experimental
        env:
          RUSTFLAGS: -Copt-level=3 -Cdebug-assertions -Coverflow-checks=y -Cdebuginfo=0
          RUST_BACKTRACE: 1

  test-verifier:
    name: Test Verifier Crate
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli
  
      - name: Run cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: --all-targets --all-features --tests

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release --package sp1-verifier -F ark
        env:
          RUSTFLAGS: -Copt-level=3 -Coverflow-checks=y -Cdebuginfo=0 -C target-cpu=native
          RUST_BACKTRACE: 1

  lint:
    name: Formatting & Clippy
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Check test-artifacts
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: -p test-artifacts

      - name: Run cargo clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: >-
            --all-features --all-targets
            -- -D warnings -A incomplete-features

  check:
    name: Cargo Check
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      RUSTFLAGS: "--cfg sp1_debug_constraints"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli

      - name: Check workspace no features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets --no-default-features

      - name: Check workspace with default features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets

      - name: Check workspace with all features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets --all-features

  check-nightly:
    name: Cargo Check (Nightly)
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}
          rustup_override: nightly

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli

      - name: Check workspace no features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets --no-default-features

      - name: Check workspace with default features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets

      - name: Check workspace with all features
        uses: actions-rs/cargo@v1
        with:
          command: check
          args: >-
            --workspace --all-targets --all-features

  examples:
    name: Examples
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup CI
        uses: ./.github/actions/setup
        with:
          pull_token: ${{ secrets.PRIVATE_PULL_TOKEN }}

      - name: Install SP1 toolchain from repo
        run: |
          cargo run -p sp1-cli --no-default-features -- prove install-toolchain
          cd crates/cli
          cargo install --force --locked --path .
          cargo clean  

      - name: Run cargo fmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
          toolchain: nightly
        env:
          CARGO_INCREMENTAL: 1

      - name: Run cargo check
        run: |
          cd ./examples/
          cargo check --all-targets --all-features

